<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Qtile Desktop Simulation – Center Logo</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #cfcfcf, #e7e7e7);
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
    }

    /* ---------------------------------------------------------------
       Top Bar
    ----------------------------------------------------------------- */
    .topbar {
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 88%;
        height: 75px;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(18px);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.20);
        border: 1px solid rgba(255,255,255,0.35);
        z-index: 1;
    }

    /* Workspaces */
    .workspaces {
        display: flex;
        gap: 10px;
    }

    .ws {
        width: 30px;
        height: 30px;
        border-radius: 50px;
        background: rgba(255,255,255,0.55);
        display: flex;
        justify-content: center;
        align-items: center;
        color: #444;
        font-size: 14px;
        cursor: pointer;
        transition: 0.25s;
        border: 1px solid rgba(255,255,255,0.4);
    }
    .ws:hover {
        background: rgba(255,255,255,0.85);
        transform: scale(1.15);
    }
    .ws.active {
        background: #007bff;
        color: white;
        font-weight: bold;
        transform: scale(1.2);
        box-shadow: 0 0 12px #007bff;
    }

    /* ---------------------------------------------------------------
       Floating Debian Logo (Perfect Center Element)
    ----------------------------------------------------------------- */
    .center-logo {
        position: absolute;
        top: 12px;          /* leicht nach oben versetzt */
        left: 50%;
        transform: translateX(-50%);
        width: 82px;
        height: 82px;
        background: rgba(255,255,255,0.45);
        border-radius: 50%;
        backdrop-filter: blur(15px);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.35);
        z-index: 3;
        animation: softPulse 5s ease-in-out infinite;
    }

    @keyframes softPulse {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.06); }
    }

    .center-logo img {
        width: 45px;
        opacity: 0.85;
        filter: drop-shadow(0px 0px 6px rgba(0,0,0,0.2));
    }

    /* ---------------------------------------------------------------
       Stats Section (Right Side)
    ----------------------------------------------------------------- */
    .stats-container {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .badge {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 7px 14px;
        border-radius: 14px;
        background: rgba(255,255,255,0.35);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.35);
        font-weight: 600;
        font-size: 14px;
        transition: 0.2s;
    }

    .badge:hover {
        background: rgba(255,255,255,0.55);
        transform: translateY(-2px);
    }

    .badge img {
        width: 19px;
    }

    .separator {
        font-size: 20px;
        opacity: 0.35;
        margin: 0 3px;
    }

</style>
</head>
<body>

<!-- Center Debian Logo -->
<div class="center-logo">
    <img src="https://img.icons8.com/ios-glyphs/60/debian.png" alt="Debian">
</div>

<!-- Top Panel -->
<div class="topbar">

    <!-- Workspaces -->
    <div class="workspaces">
        <div class="ws active">1</div>
        <div class="ws">2</div>
        <div class="ws">3</div>
        <div class="ws">4</div>
        <div class="ws">5</div>
        <div class="ws">6</div>
        <div class="ws">7</div>
        <div class="ws">8</div>
        <div class="ws">9</div>
    </div>

    <!-- Stats -->
    <div class="stats-container">

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/cpu.png" alt="">
            <span id="cpu">0%</span>
        </div>
        <span class="separator">|</span>

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/ram.png" alt="">
            <span id="ram">0%</span>
        </div>
        <span class="separator">|</span>

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/thermometer.png" alt="">
            <span id="temp">45°C</span>
        </div>
        <span class="separator">|</span>

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/medium-volume.png" alt="">
            <span id="vol">57%</span>
        </div>
        <span class="separator">|</span>

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/charged-battery.png" alt="">
            <span id="bat">82%</span>
        </div>
        <span class="separator">|</span>

        <div class="badge">
            <img src="https://img.icons8.com/ios-filled/50/calendar.png" alt="">
            <span id="date">00.00.0000</span>
            <img src="https://img.icons8.com/ios-glyphs/50/clock--v1.png" alt="">
            <span id="time">00:00</span>
        </div>

    </div>

</div>

<script>
    function randomPercent() {
        return Math.floor(Math.random() * 100);
    }

    function randomTemp() {
        return 30 + Math.floor(Math.random() * 40);
    }

    function updateStats() {
        let cpu = randomPercent();
        let ram = randomPercent();
        let temp = randomTemp();

        document.getElementById("cpu").innerText = cpu + "%";
        document.getElementById("ram").innerText = ram + "%";
        document.getElementById("temp").innerText = temp + "°C";

        document.getElementById("cpu").style.color =
            cpu < 30 ? "black" : cpu < 70 ? "orange" : "red";

        document.getElementById("ram").style.color =
            ram < 30 ? "black" : ram < 70 ? "orange" : "red";

        document.getElementById("temp").style.color =
            temp < 60 ? "black" : temp < 75 ? "orange" : "red";
    }

    function updateClock() {
        let now = new Date();
        let d = String(now.getDate()).padStart(2, "0");
        let m = String(now.getMonth()+1).padStart(2, "0");
        let y = now.getFullYear();

        document.getElementById("date").innerText = `${d}.${m}.${y}`;
        document.getElementById("time").innerText =
            now.toLocaleTimeString("de-DE", {hour:"2-digit", minute:"2-digit"});
    }

    setInterval(updateStats, 3000);
    setInterval(updateClock, 1000);

    updateStats();
    updateClock();
</script>

</body>
</html>
